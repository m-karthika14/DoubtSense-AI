<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DoubtSense AI</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 12px; width: 320px; }
      label { display: block; font-size: 12px; margin: 10px 0 4px; }
      input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
      .row { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
      button { padding: 8px 10px; cursor: pointer; }
      .hint { font-size: 12px; opacity: 0.8; margin-top: 8px; }
      .status { font-size: 12px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h3 style="margin:0 0 8px;">DoubtSense AI</h3>

    <label for="apiBase">API Base URL</label>
    <input id="apiBase" type="text" placeholder="http://localhost:4010" />

    <label for="userId">userid</label>
    <input id="userId" type="text" placeholder="name_123" />

    <div class="row">
      <label style="margin:0; display:flex; gap:8px; align-items:center;">
        <input id="importantContent" type="checkbox" />
        Mark as important (store in contents)
      </label>
    </div>

    <div class="row">
      <button id="save">Save</button>
      <button id="sendNow">Send current tab</button>
    </div>

    <div class="hint">The extension always updates context. It stores content only when “important” is enabled.</div>
    <div class="hint">Agent status is synced from the app (localStorage: <code>doubtsense_agentActive</code>).</div>
    <div id="status" class="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
